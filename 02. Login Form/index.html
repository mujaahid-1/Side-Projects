<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InsideBox Logo</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="logo-icon"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="m21 7.5-9-5.25L3 7.5m18 0-9 5.25m9-5.25v9l-9 5.25M3 7.5l9 5.25M3 7.5v9l9 5.25m0-9v9"
        />
      </svg>

      <span class="logo-text">InsideBox</span>
    </header>
    <div class="container">
      <div class="inside-container">
        <p class="details-text">Please enter your details</p>

        <h1 class="h1-welcome">Welcome back</h1>

        <form>
          <input
            type="email"
            class="address label"
            placeholder="Email address"
          />
          <input
            type="password"
            class="password label"
            placeholder="Password"
          />
          <button type="submit" class="sign-in">Sign in</button>
        </form>

        <div class="extra-functionality">
          <div class="reminder">
            <label class="checkbox">
              <input type="checkbox" />
            </label>
            <span class="reminder-text">Remember for 30 days</span>
          </div>
          <a href="#" class="forget-password">Forgot password</a>
        </div>

        <a href="#" class="google-sign-in">
          <img src="./img/google logo 1.png" class="google-img" alt="" />
          <span class="google-btn-text">Sign in with Google</span>
        </a>

        <div class="sign-up">
          <span>Don't have an account?</span>
          <a href="#" class="sign-up-text">Sign up</a>
        </div>
      </div>
    </div>
  </body>
</html>
